<!doctype html>
<!--
  canvas.html — shader output window (two-window WS template)
  Receives param updates AND shader source swaps over WebSocket.
  Boots with src/shader.frag loaded via fetch().
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shader Output</title>
  <style>
    :root { color-scheme: dark; }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
    #glcanvas { display: block; width: 100vw; height: 100vh; }
    #overlay {
      position: fixed; top: 10px; right: 12px;
      font-family: 'SF Mono', monospace; font-size: 10px;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
      transition: opacity 1s ease; z-index: 10;
    }
    #overlay.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="overlay">WS: connecting…</div>
  <canvas id="glcanvas"></canvas>
  <script src="canvas.js"></script>
</body>
</html>
