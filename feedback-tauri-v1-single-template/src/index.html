<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Feedback · Webcam · Ping-Pong FBO</title>
  <style>
    :root { color-scheme: dark; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #060608; color: #e0e0e8; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    #app { display: flex; width: 100vw; height: 100vh; }

    #panel { flex: 0 0 260px; height: 100vh; overflow-y: auto; background: #0a0a0d; border-right: 1px solid #1a1a22; display: flex; flex-direction: column; padding: 12px; gap: 5px; }
    #panel::-webkit-scrollbar { width: 3px; }
    #panel::-webkit-scrollbar-thumb { background: #252530; border-radius: 2px; }

    .panel-title { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #a07fff; padding-bottom: 8px; border-bottom: 1px solid #1a1a22; margin-bottom: 2px; }
    .section-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #a07fff; padding: 8px 0 3px; border-top: 1px solid #1a1a22; margin-top: 4px; }

    .param-row { display: flex; align-items: center; gap: 6px; padding: 5px 7px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; }
    .param-row:hover { border-color: rgba(160,127,255,0.3); }
    .param-row label { flex: 0 0 82px; font-size: 10px; color: rgba(255,255,255,0.38); letter-spacing: 0.04em; text-transform: uppercase; user-select: none; }
    input[type=range] { -webkit-appearance: none; flex: 1; height: 2px; background: rgba(255,255,255,0.12); border-radius: 1px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #a07fff; }
    input[type=range]:hover::-webkit-slider-thumb { background: #c8aaff; transform: scale(1.3); }
    .param-value { flex: 0 0 52px; text-align: right; font-size: 10px; color: #a07fff; font-variant-numeric: tabular-nums; }

    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .mode-btn { padding: 6px 4px; background: rgba(160,127,255,0.07); border: 1px solid rgba(160,127,255,0.2); border-radius: 6px; color: rgba(255,255,255,0.4); font-family: inherit; font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.12s; text-align: center; }
    .mode-btn:hover { background: rgba(160,127,255,0.15); color: #e0d0ff; }
    .mode-btn.active { background: rgba(160,127,255,0.22); border-color: rgba(160,127,255,0.6); color: #d0b8ff; font-weight: 700; }

    .action-btn { width: 100%; padding: 7px; background: rgba(160,127,255,0.1); border: 1px solid rgba(160,127,255,0.35); border-radius: 6px; color: #a07fff; font-family: inherit; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
    .action-btn:hover { background: rgba(160,127,255,0.22); }
    #clear-btn { background: rgba(255,80,80,0.07); border-color: rgba(255,80,80,0.25); color: rgba(255,120,120,0.7); }
    #clear-btn:hover { background: rgba(255,80,80,0.15); }

    /* Camera */
    #cam-select { width: 100%; padding: 5px 7px; background: #111115; border: 1px solid #2a2a36; border-radius: 6px; color: #e0e0e8; font-family: inherit; font-size: 10px; cursor: pointer; }
    #cam-select:disabled { color: rgba(255,255,255,0.25); cursor: not-allowed; }
    .cam-row { display: flex; gap: 5px; }
    #cam-btn { flex: 1; padding: 6px 8px; background: rgba(160,127,255,0.1); border: 1px solid rgba(160,127,255,0.3); border-radius: 6px; color: #a07fff; font-family: inherit; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
    #cam-btn:hover { background: rgba(160,127,255,0.22); }
    #cam-refresh { flex: 0 0 28px; padding: 6px 0; background: rgba(160,127,255,0.08); border: 1px solid rgba(160,127,255,0.2); border-radius: 6px; color: rgba(160,127,255,0.5); font-family: inherit; font-size: 13px; cursor: not-allowed; line-height: 1; }
    #cam-refresh:not(:disabled) { color: #a07fff; cursor: pointer; }
    #cam-refresh:not(:disabled):hover { background: rgba(160,127,255,0.2); }
    #cam-status { font-size: 9px; color: rgba(255,255,255,0.25); text-align: center; padding: 2px 0; }
    #cam-status.ok  { color: #7fff9f; }
    #cam-status.err { color: #ff8080; }

    .param-row.mix-row label { flex: 0 0 82px; }

    .mode-desc { font-size: 9px; color: rgba(255,255,255,0.22); padding: 4px 6px; line-height: 1.5; border-left: 2px solid rgba(160,127,255,0.3); }
    .footer { margin-top: auto; padding-top: 10px; font-size: 9px; color: rgba(255,255,255,0.15); text-align: center; border-top: 1px solid #1a1a22; }

    #canvas-container { flex: 1; position: relative; overflow: hidden; background: #000; cursor: crosshair; }
    #glcanvas { display: block; width: 100%; height: 100%; }
    #webcam-video { display: none; }
  </style>
</head>
<body>
<div id="app">
  <div id="panel">
    <div class="panel-title">Feedback · Webcam</div>

    <div class="section-label">Camera</div>
    <div style="display:flex;gap:5px">
      <select id="cam-select" style="flex:1" disabled><option value="">Start camera first…</option></select>
      <button id="cam-refresh" disabled>↺</button>
    </div>
    <div class="cam-row">
      <button id="cam-btn">▶ Start</button>
    </div>
    <div id="cam-status">not started</div>

    <div class="section-label">Mode</div>
    <div class="mode-grid">
      <button class="mode-btn active" data-mode="0">Echo Trail</button>
      <button class="mode-btn"        data-mode="1">Fluid Smear</button>
      <button class="mode-btn"        data-mode="2">React-Diff</button>
      <button class="mode-btn"        data-mode="3">Thermal</button>
      <button class="mode-btn"        data-mode="4">Mirror Echo</button>
      <button class="mode-btn"        data-mode="5">Glitch Mem</button>
    </div>
    <div id="mode-desc" class="mode-desc">Your webcam frame decays and accumulates — movement leaves glowing trails.</div>

    <div class="section-label">Feedback</div>
    <div class="param-row">
      <label for="decay">Decay</label>
      <input id="decay" type="range" min="0.8" max="0.999" step="0.001" value="0.97">
      <span class="param-value" id="decay-val">0.970</span>
    </div>
    <div class="param-row">
      <label for="camMix">Cam Mix</label>
      <input id="camMix" type="range" min="0.0" max="1.0" step="0.01" value="0.3">
      <span class="param-value" id="camMix-val">0.30</span>
    </div>
    <div class="param-row">
      <label for="speed">Speed</label>
      <input id="speed" type="range" min="0.0" max="3.0" step="0.01" value="1.0">
      <span class="param-value" id="speed-val">1.00</span>
    </div>
    <div class="param-row">
      <label for="scale">Flow Scale</label>
      <input id="scale" type="range" min="0.1" max="4.0" step="0.05" value="1.0">
      <span class="param-value" id="scale-val">1.00</span>
    </div>
    <div class="param-row">
      <label for="intensity">Intensity</label>
      <input id="intensity" type="range" min="0.0" max="2.0" step="0.01" value="1.0">
      <span class="param-value" id="intensity-val">1.00</span>
    </div>

    <div class="section-label">Color</div>
    <div class="param-row">
      <label for="hue">Hue Drift</label>
      <input id="hue" type="range" min="0.0" max="1.0" step="0.005" value="0.0">
      <span class="param-value" id="hue-val">0.000</span>
    </div>
    <div class="param-row">
      <label for="palette">Palette</label>
      <input id="palette" type="range" min="0" max="4" step="1" value="0">
      <span class="param-value" id="palette-val">Fire</span>
    </div>

    <div class="section-label">Draw</div>
    <div class="param-row">
      <label for="brush">Brush</label>
      <input id="brush" type="range" min="0.005" max="0.15" step="0.005" value="0.03">
      <span class="param-value" id="brush-val">0.030</span>
    </div>
    <button id="clear-btn" class="action-btn">✕ Clear</button>

    <div class="footer">feedback · webcam · ping-pong fbo</div>
  </div>

  <div id="canvas-container">
    <canvas id="glcanvas"></canvas>
  </div>
</div>
<video id="webcam-video" autoplay playsinline muted></video>
<script src="sketch.js"></script>
</body>
</html>
